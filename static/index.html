<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR 美甲体验</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #ff7eb3;
            --primary-dark: #ff758c;
            --bg-dark: #121212;
            --glass-bg: rgba(30, 30, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            background-color: #000;
            z-index: 1;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 80px;
        }

        .input_video { display: none; }

        .bg_canvas {
            display: block;
            width: 100%;
            height: auto;
            transform: scaleX(-1);
        }

        .top-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 20px;
        }

        .app-title {
            margin: 0; font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #dbStatus {
            font-size: 12px; padding: 4px 10px; border-radius: 20px;
            background: rgba(0, 255, 204, 0.1); color: #00ffcc;
            border: 1px solid rgba(0, 255, 204, 0.3); margin-top: 5px;
        }

        .loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 16px; font-weight: 600; color: white;
            background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 30px;
            backdrop-filter: blur(10px); z-index: 10; border: 1px solid var(--glass-border);
        }

        .floating-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 600px; background: var(--glass-bg);
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 32px; padding: 20px 24px; z-index: 10;
            display: flex; flex-direction: column; gap: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .section-title { font-size: 14px; color: rgba(255,255,255,0.6); margin: 0 0 8px 0; font-weight: 500; }
        .gallery { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; align-items: center; }
        .gallery::-webkit-scrollbar { height: 4px; }
        .gallery::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .sliders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-top: 5px; }
        .slider-container { display: flex; align-items: center; gap: 8px; }
        .slider-container label { font-size: 12px; color: rgba(255,255,255,0.8); width: 30px; }
        input[type=range] { flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); cursor: pointer; }

        .shape-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; padding: 8px 12px; border-radius: 12px; cursor: pointer;
            font-size: 11px; white-space: nowrap; transition: all 0.3s; text-align: center;
        }
        .shape-btn.active { background: var(--primary); border-color: white; }

        /* Color Picker */
        .color-picker-container {
            display: flex; align-items: center; gap: 12px; margin-top: 8px;
        }
        .color-picker-wrap {
            position: relative; width: 50px; height: 50px; border-radius: 25px;
            overflow: hidden; border: 2px solid var(--glass-border);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #colorPicker {
            position: absolute; top: -10px; left: -10px;
            width: 70px; height: 70px; border: none; padding: 0;
            cursor: pointer; background: transparent;
        }
        .color-hex {
            font-size: 14px; color: rgba(255,255,255,0.8); font-family: monospace;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1 class="app-title">Nail Studio Pro</h1>
        <div id="dbStatus">AR 美甲引擎在线</div>
    </div>

    <div class="camera-container" id="container">
        <video class="input_video" autoplay playsinline muted></video>
        <canvas class="bg_canvas" width="1280" height="720"></canvas>
        <div id="loadingIndicator" class="loading">正在加载手部检测模型...</div>
        
        <!-- 隐藏/显示控制面板按钮 -->
        <button id="togglePanelBtn" style="position:fixed; top:20px; right:20px; z-index:100; width:44px; height:44px; border-radius:50%; background:var(--glass-bg); backdrop-filter:blur(10px); border:1px solid var(--glass-border); color:white; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;">⚙</button>
    </div>

    <div class="floating-panel" id="floatingPanel">
        <div>
            <h3 class="section-title">形态微调</h3>
            <div class="sliders-grid">
                <div class="slider-container">
                    <label>长度</label><input type="range" id="lengthSlider" min="0.5" max="1.5" step="0.02" value="1.0">
                </div>
                <div class="slider-container">
                    <label>宽度</label><input type="range" id="widthSlider" min="0.5" max="1.5" step="0.02" value="1.0">
                </div>
                <div class="slider-container">
                    <label>位置</label><input type="range" id="posSlider" min="0.2" max="0.8" step="0.02" value="0.45">
                </div>
                <div class="slider-container">
                    <label>弧度</label><input type="range" id="curveSlider" min="0.1" max="0.5" step="0.02" value="0.25">
                </div>
            </div>
        </div>

        <div>
            <h3 class="section-title">1. 全球主流甲型库</h3>
            <div class="gallery" id="shapeGallery">
                <button class="shape-btn active" data-shape="squoval" data-len="1.1">方圆甲 Squoval<br><span style="font-size:9px;color:#ddd">(亚洲日常百搭)</span></button>
                <button class="shape-btn" data-shape="oval" data-len="1.2">椭圆甲 Oval<br><span style="font-size:9px;color:#ddd">(日系极致温柔)</span></button>
                <button class="shape-btn" data-shape="almond" data-len="1.4">杏仁甲 Almond<br><span style="font-size:9px;color:#ddd">(优雅拉长显瘦)</span></button>
                <button class="shape-btn" data-shape="coffin" data-len="1.5">梯形甲 Coffin<br><span style="font-size:9px;color:#ddd">(欧美火爆顶流)</span></button>
                <button class="shape-btn" data-shape="stiletto" data-len="1.6">尖钉甲 Stiletto<br><span style="font-size:9px;color:#ddd">(夸张视觉焦点)</span></button>
                <button class="shape-btn" data-shape="square" data-len="1.2">直角方甲 Square<br><span style="font-size:9px;color:#ddd">(欧美经典极简)</span></button>
            </div>
            
            <h3 class="section-title" style="margin-top: 15px;">2. 自定义颜色</h3>
            <div class="color-picker-container">
                <div class="color-picker-wrap" id="colorPickerWrap" style="background-color: #E2A7AD;">
                    <input type="color" id="colorPicker" value="#E2A7AD">
                </div>
                <span class="color-hex" id="colorHex">#E2A7AD</span>
            </div>
            
            <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
                <button id="uploadBtn" style="background: linear-gradient(135deg, #ff7eb3, #ff758c); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(255,126,179,0.4); transition: transform 0.2s;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    上传贴图
                </button>
                <input type="file" id="imageUpload" accept="image/*" style="display:none">
                
                <button id="clearTextureBtn" style="background: rgba(255,100,100,0.15); color: #ff6464; border: 1px solid rgba(255,100,100,0.4); padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">
                    ✕ 清除贴图
                </button>
                
                <button id="switchCameraBtn" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                    🔄 切换摄像头
                </button>
            </div>
        </div>
    </div>

    <script>
        // === 0. 全局错误捕获 ===
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.getElementById('dbStatus').innerHTML = `ERROR: ${msg} <br> ${lineNo}:${columnNo}`;
            document.getElementById('dbStatus').style.background = 'red';
            document.getElementById('dbStatus').style.color = 'white';
        };
        window.addEventListener('unhandledrejection', function(event) {
            document.getElementById('dbStatus').innerHTML = `PROMISE ERROR: ${event.reason}`;
            document.getElementById('dbStatus').style.background = 'red';
            document.getElementById('dbStatus').style.color = 'white';
        });

        // === 1. 状态管理 ===
        let customLength = 1.0;
        let customWidth = 1.0;
        let customCurve = 0.25;
        let customPos = 0.45;
        let currentShapeId = 'squoval';
        let currentColor = '#E2A7AD';
        let currentNailTextureImg = null;
        
        // === 隐藏/显示控制面板 ===
        let panelHidden = false;
        document.getElementById('togglePanelBtn').addEventListener('click', () => {
            panelHidden = !panelHidden;
            const panel = document.getElementById('floatingPanel');
            const btn = document.getElementById('togglePanelBtn');
            if (panelHidden) {
                panel.style.display = 'none';
                btn.textContent = '👁';
            } else {
                panel.style.display = 'flex';
                btn.textContent = '⚙';
            }
        });

        // === 滑块监听 ===
        document.getElementById('lengthSlider').addEventListener('input', e => customLength = parseFloat(e.target.value));
        document.getElementById('widthSlider').addEventListener('input', e => customWidth = parseFloat(e.target.value));
        document.getElementById('posSlider').addEventListener('input', e => customPos = parseFloat(e.target.value));
        document.getElementById('curveSlider').addEventListener('input', e => customCurve = parseFloat(e.target.value));
        
        // === 甲型选择 ===
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentShapeId = btn.getAttribute('data-shape');
                
                const recLen = parseFloat(btn.getAttribute('data-len'));
                document.getElementById('lengthSlider').value = recLen;
                customLength = recLen;
            });
        });

        // === Color Picker ===
        const colorPicker = document.getElementById('colorPicker');
        const colorPickerWrap = document.getElementById('colorPickerWrap');
        const colorHex = document.getElementById('colorHex');
        
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            colorPickerWrap.style.backgroundColor = currentColor;
            colorHex.textContent = currentColor.toUpperCase();
            // 选择颜色时清除贴图
            currentNailTextureImg = null;
        });

        // === 清除贴图 ===
        document.getElementById('clearTextureBtn').addEventListener('click', () => {
            currentNailTextureImg = null;
            console.log('✅ 贴图已清除');
        });

        // === 手动上传贴图 ===
        const uploadBtn = document.getElementById('uploadBtn');
        const imageUpload = document.getElementById('imageUpload');
        uploadBtn.addEventListener('click', () => imageUpload.click());

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                currentNailTextureImg = img;
                console.log('✅ 贴图已加载');
            };
            img.src = url;
        });

        // === 2. 手指信息 (MediaPipe 关键点) ===
        const V_WIDTH = 1280;
        const V_HEIGHT = 720;
        
        const fingersInfo = [
            { pip: 2, dip: 3, tip: 4, name: 'thumb', wRatio: 0.9 },
            { pip: 6, dip: 7, tip: 8, name: 'index', wRatio: 0.8 },
            { pip: 10, dip: 11, tip: 12, name: 'middle', wRatio: 0.82 },
            { pip: 14, dip: 15, tip: 16, name: 'ring', wRatio: 0.8 },
            { pip: 18, dip: 19, tip: 20, name: 'pinky', wRatio: 0.7 }
        ];

        // EMA 防抖算法
        const smoothedState = {};
        function smoothVal(id, v, f=0.2) {
            if(smoothedState[id] === undefined) { smoothedState[id] = v; return v; }
            smoothedState[id] += (v - smoothedState[id]) * f;
            return smoothedState[id];
        }

        const videoElement = document.querySelector('.input_video');
        const bgCanvas = document.querySelector('.bg_canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // === 动态适配视频比例 (解决 iPhone 竖屏画面变扁的问题) ===
        // canvas 固定 1280x720 会导致 9:16 视频被拉伸, 这里监听 video 实际尺寸动态调整
        let videoRealW = 1280, videoRealH = 720;
        videoElement.addEventListener('loadedmetadata', () => {
            videoRealW = videoElement.videoWidth || 1280;
            videoRealH = videoElement.videoHeight || 720;
            // 保持 canvas 的 width/height 属性与视频比例一致, 避免 drawImage 拉伸
            bgCanvas.width = videoRealW;
            bgCanvas.height = videoRealH;
            console.log('视频尺寸:', videoRealW, 'x', videoRealH);
        });

        // === 3. 生成静态 ISO 噪点贴图 ===
        const noiseCanvas = document.createElement('canvas');
        noiseCanvas.width = 64;
        noiseCanvas.height = 64;
        const nCtx = noiseCanvas.getContext('2d');
        const imgData = nCtx.createImageData(64, 64);
        for(let i = 0; i < imgData.data.length; i += 4) {
            const val = Math.random() * 255;
            imgData.data[i] = val;
            imgData.data[i+1] = val;
            imgData.data[i+2] = val;
            imgData.data[i+3] = 30;
        }
        nCtx.putImageData(imgData, 0, 0);

        // === 4. 2D 绘图引擎 ===
        function drawGlossyNail2D(ctx, basePoint, tipPoint, colorStr, curveVal, lengthScale, widthScale) {
            const dx = tipPoint.x - basePoint.x;
            const dy = tipPoint.y - basePoint.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx);
            
            const nLength = dist * 1.5 * lengthScale;
            const nWidth = dist * 0.7 * widthScale;
            
            const centerX = basePoint.x + dx * customPos;
            const centerY = basePoint.y + dy * customPos;
            
            ctx.save();
            if (currentNailTextureImg && currentNailTextureImg.complete) {
                ctx.filter = 'none';
            } else {
                ctx.filter = 'blur(1.2px)';
            }
            ctx.translate(centerX, centerY);
            ctx.rotate(angle - Math.PI / 2);
            
            // 2D 甲型参数化路径
            ctx.beginPath();
            const w2 = nWidth / 2;
            ctx.moveTo(-w2, 0);
            ctx.quadraticCurveTo(-w2, -nLength * 0.15, 0, -nLength * 0.3);
            ctx.quadraticCurveTo(w2, -nLength * 0.15, w2, 0);
            
            if (currentShapeId === 'squoval') {
                ctx.lineTo(w2, nLength * 0.6);
                ctx.quadraticCurveTo(w2, nLength * 0.8, w2 * 0.6, nLength * 0.8);
                ctx.lineTo(-w2 * 0.6, nLength * 0.8);
                ctx.quadraticCurveTo(-w2, nLength * 0.8, -w2, nLength * 0.6);
            } else if (currentShapeId === 'oval') {
                ctx.lineTo(w2, nLength * 0.4);
                ctx.bezierCurveTo(w2, nLength * 0.7, w2 * 0.6, nLength, 0, nLength);
                ctx.bezierCurveTo(-w2 * 0.6, nLength, -w2, nLength * 0.7, -w2, nLength * 0.4);
            } else if (currentShapeId === 'almond') {
                ctx.lineTo(w2, nLength * 0.2);
                ctx.bezierCurveTo(w2, nLength * 0.6, w2 * 0.3, nLength * 1.1, 0, nLength * 1.1);
                ctx.bezierCurveTo(-w2 * 0.3, nLength * 1.1, -w2, nLength * 0.6, -w2, nLength * 0.2);
            } else if (currentShapeId === 'coffin') {
                ctx.lineTo(w2, nLength * 0.2);
                ctx.lineTo(w2 * 0.4, nLength * 1.1);
                ctx.lineTo(-w2 * 0.4, nLength * 1.1);
                ctx.lineTo(-w2, nLength * 0.2);
            } else if (currentShapeId === 'stiletto') {
                ctx.lineTo(w2, 0);
                ctx.bezierCurveTo(w2 * 0.8, nLength * 0.5, w2 * 0.1, nLength * 1.3, 0, nLength * 1.4);
                ctx.bezierCurveTo(-w2 * 0.1, nLength * 1.3, -w2 * 0.8, nLength * 0.5, -w2, 0);
            } else if (currentShapeId === 'square') {
                ctx.lineTo(w2, nLength * 0.8);
                ctx.lineTo(-w2, nLength * 0.8);
            }
            ctx.closePath();
            
            // 解析颜色
            let r = 255, g = 255, b = 255;
            if (colorStr.startsWith('#') && colorStr.length === 7) {
                r = parseInt(colorStr.slice(1, 3), 16);
                g = parseInt(colorStr.slice(3, 5), 16);
                b = parseInt(colorStr.slice(5, 7), 16);
            }
            
            ctx.clip();
            
            if (currentNailTextureImg && currentNailTextureImg.complete) {
                // 贴图模式: 用临时 canvas 合成
                const nailTop = -nLength * 0.3;
                const nailBottom = nLength;
                const nailDrawH = nailBottom - nailTop;
                const nailDrawW = nWidth;
                
                const tmpCanvas = document.createElement('canvas');
                tmpCanvas.width = Math.ceil(nailDrawW * 1.5);
                tmpCanvas.height = Math.ceil(nailDrawH * 1.2);
                const tmpCtx = tmpCanvas.getContext('2d');
                
                const tmpW = tmpCanvas.width;
                tmpCtx.drawImage(currentNailTextureImg, tmpW/2 - nailDrawW/2, 0, nailDrawW, nailDrawH);
                
                // 根部羽化
                const fadeH = nailDrawH * 0.35;
                const texGrad = tmpCtx.createLinearGradient(0, 0, 0, fadeH);
                texGrad.addColorStop(0, 'rgba(0, 0, 0, 1)');
                texGrad.addColorStop(0.5, 'rgba(0, 0, 0, 0.6)');
                texGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                tmpCtx.globalCompositeOperation = 'destination-out';
                tmpCtx.fillStyle = texGrad;
                tmpCtx.fillRect(0, 0, tmpW, fadeH);
                tmpCtx.globalCompositeOperation = 'source-over';
                
                ctx.drawImage(tmpCanvas, tmpW/2 - nailDrawW/2, 0, nailDrawW, nailDrawH,
                              -nailDrawW/2, nailTop, nailDrawW, nailDrawH);
            } else {
                // 纯色模式
                const fillGrad = ctx.createLinearGradient(0, -nLength * 0.3, 0, nLength * 0.1);
                fillGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0)`);
                fillGrad.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, 0.6)`);
                fillGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 1)`);
                ctx.fillStyle = fillGrad;
                ctx.fillRect(-nWidth, -nLength * 0.3, nWidth * 2, nLength * 1.5);
            }
            
            ctx.rotate(-(angle - Math.PI / 2));
            
            // 高光和噪点只在纯色模式下叠加
            if (!currentNailTextureImg || !currentNailTextureImg.complete) {
                const grad = ctx.createLinearGradient(-nLength, -nLength, nLength, nLength);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.1)');
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = grad;
                const box = nLength * 2;
                ctx.fillRect(-box, -box, box*2, box*2);
                
                ctx.globalCompositeOperation = 'overlay';
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = ctx.createPattern(noiseCanvas, 'repeat');
                ctx.fillRect(-box, -box, box*2, box*2);
            }
            
            ctx.restore();
        }

        function onResults(results) {
            if (loadingIndicator.style.display !== 'none') loadingIndicator.style.display = 'none';

            bgCtx.save();
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.drawImage(results.image, 0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.restore();

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let h = 0; h < results.multiHandLandmarks.length; h++) {
                    const landmarks = results.multiHandLandmarks[h];
                    
                    for (const finger of fingersInfo) {
                        const dip = landmarks[finger.dip]; 
                        const tip = landmarks[finger.tip]; 
                        
                        const prefix = `h${h}_f${finger.name}`;
                        const dipX = smoothVal(`${prefix}_dx`, dip.x);
                        const dipY = smoothVal(`${prefix}_dy`, dip.y);
                        const tipX = smoothVal(`${prefix}_tx`, tip.x);
                        const tipY = smoothVal(`${prefix}_ty`, tip.y);
                        
                        const vBaseScreen = { x: dipX * bgCanvas.width, y: dipY * bgCanvas.height };
                        const vTipScreen = { x: tipX * bgCanvas.width, y: tipY * bgCanvas.height };
                        
                        drawGlossyNail2D(bgCtx, vBaseScreen, vTipScreen, currentColor, customCurve, customLength, customWidth);
                    }
                }
            }
        }

        // 检测移动端
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 1, // 移动端只检测一只手, 提升性能
            modelComplexity: isMobile ? 0 : 1, // 移动端用轻量模型
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        // 当前使用的摄像头 (前置/后置)
        let currentFacingMode = 'user'; // 'user' = 前置, 'environment' = 后置
        let cameraFeed = null;

        function startCamera(facingMode) {
            // 停止旧摄像头
            if (cameraFeed) {
                try { cameraFeed.stop(); } catch(e) {}
            }
            
            currentFacingMode = facingMode;
            
            // 前置摄像头镜像 (自拍效果), 后置摄像头不镜像
            bgCanvas.style.transform = (facingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
            
            cameraFeed = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: isMobile ? 640 : V_WIDTH,
                height: isMobile ? 480 : V_HEIGHT,
                facingMode: facingMode
            });
            
            cameraFeed.start().catch(err => {
                console.error('摄像头启动失败:', err);
                document.getElementById('dbStatus').innerHTML = '摄像头启动失败: ' + err.message;
            });
        }

        // 切换摄像头按钮
        document.getElementById('switchCameraBtn').addEventListener('click', () => {
            const newMode = currentFacingMode === 'user' ? 'environment' : 'user';
            console.log('切换摄像头:', currentFacingMode, '→', newMode);
            startCamera(newMode);
        });

        // 首次启动 (前置摄像头)
        setTimeout(() => { startCamera('user'); }, 500);

    </script>
</body>
</html>
